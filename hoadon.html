<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa Đơn Điện Tử - Viet Travel Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="hoadon-page">
    <div class="invoice-wrap">
        <div class="invoice-paper" id="hoadon-area">
            <!-- Nội dung hóa đơn được render bằng JS -->
            <div id="hoadon-content" class="text-center text-muted py-5">
                <i class="bi bi-hourglass-split"></i> Đang tải hóa đơn...
            </div>
        </div>

        <!-- Nút hành động (không in) -->
        <div class="inv-actions no-print">
            <button class="btn btn-primary px-4 fw-700" onclick="window.print()">
                <i class="bi bi-printer-fill"></i> In hóa đơn
            </button>
            <a class="btn btn-outline-secondary px-4 fw-700 ms-2" href="cart.html">
                <i class="bi bi-cart3"></i> Về giỏ hàng
            </a>
            <a class="btn btn-outline-secondary px-4 fw-700 ms-2" href="index.html">
                <i class="bi bi-house-door"></i> Về trang chủ
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    <script>
        // =============================================================
        // RENDER HÓA ĐƠN ĐIỆN TỬ
        // Đọc maDon từ query string → tìm trong localStorage 'viettravel_lichsu'
        // =============================================================
        (function renderHoaDon() {
            var params = new URLSearchParams(window.location.search);
            var maDon = params.get('maDon');
            var content = document.getElementById('hoadon-content');

            var don = null;

            // 1) Ưu tiên đơn vừa đặt trong phiên hiện tại (sessionStorage)
            var donPhien = JSON.parse(sessionStorage.getItem('vth_don_in') || 'null');
            if (donPhien && (!maDon || donPhien.maDon === maDon)) {
                don = donPhien;
            }

            // 2) Khóa hóa đơn riêng theo mã đơn (bền vững, không bị seedData ghi đè)
            if (!don && maDon) {
                don = JSON.parse(localStorage.getItem('vth_hoadon_' + maDon) || 'null');
            }

            // 3) Fallback cuối: tra trong lịch sử mua (localStorage) theo mã đơn
            if (!don) {
                var lichSu = JSON.parse(localStorage.getItem('viettravel_lichsu') || '[]');
                for (var i = 0; i < lichSu.length; i++) {
                    if (lichSu[i].maDon === maDon) { don = lichSu[i]; break; }
                }
            }

            if (!don) {
                content.innerHTML =
                    '<div class="py-5 text-center">' +
                    '  <i class="bi bi-exclamation-triangle text-warning" style="font-size:2.5rem;"></i>' +
                    '  <h5 class="mt-3 fw-700">Không tìm thấy hóa đơn' + (maDon ? ' "' + maDon + '"' : '') + '</h5>' +
                    '  <p class="text-muted">Hóa đơn có thể đã bị xóa hoặc đường dẫn không hợp lệ.</p>' +
                    '  <a href="index.html" class="btn btn-primary mt-2">Về trang chủ</a>' +
                    '</div>';
                return;
            }

            var dinhDang = function(so) { return (so || 0).toLocaleString('vi-VN') + ' đ'; };

            // Tính lại các tổng (fallback cho đơn cũ chưa có trường mới)
            var ds = don.danhSachVe || [];
            var tamTinh = don.tamTinh;
            if (typeof tamTinh !== 'number') {
                tamTinh = 0;
                for (var t = 0; t < ds.length; t++) tamTinh += (ds[t].gia || 0) * (ds[t].soLuong || 1);
            }
            var giamGia = don.giamGia || 0;
            var tongTien = (typeof don.tongTien === 'number') ? don.tongTien : (tamTinh - giamGia);
            var hk = don.hanhKhach || {};

            // Các dòng sản phẩm
            var rows = '';
            for (var j = 0; j < ds.length; j++) {
                var ve = ds[j];
                var sl = ve.soLuong || 1;
                var thanhTien = (ve.gia || 0) * sl;
                rows +=
                    '<tr>' +
                    '  <td class="center">' + (j + 1) + '</td>' +
                    '  <td><div class="ten-dv">' + ve.loaiDichVu + '</div></td>' +
                    '  <td>' + (ve.tuyen || '') + '</td>' +
                    '  <td class="chi-tiet">' + (ve.chiTiet || '') + '</td>' +
                    '  <td class="center">' + sl + '</td>' +
                    '  <td class="num">' + dinhDang(ve.gia) + '</td>' +
                    '  <td class="num">' + dinhDang(thanhTien) + '</td>' +
                    '</tr>';
            }

            // Dòng giảm giá chỉ hiện khi có
            var rowGiam = giamGia > 0
                ? '<tr><td colspan="6" class="num">Giảm giá (MoMo 5%)</td><td class="num" style="color:#1e7e34;">-' + dinhDang(giamGia) + '</td></tr>'
                : '';

            content.innerHTML =
                // Letterhead
                '<div class="inv-head">' +
                '  <img src="jpg/Logo.jpg" alt="Logo" onerror="this.style.display=\'none\'">' +
                '  <div>' +
                '    <div class="inv-company-name">CÔNG TY TNHH DU LỊCH VIET TRAVEL HUB</div>' +
                '    <div class="inv-company-info">' +
                '      Trụ sở: 123 Lê Lợi, Phường Bến Nghé, Quận 1, TP. Hồ Chí Minh<br>' +
                '      Chi nhánh Hà Nội: 45 Tràng Tiền, Quận Hoàn Kiếm, TP. Hà Nội<br>' +
                '      Hotline: 1900 1234 &middot; Email: hotro@viettravelhub.vn &middot; Website: <a href="#">www.viettravelhub.vn</a>' +
                '    </div>' +
                '  </div>' +
                '</div>' +
                '<hr class="inv-divider">' +

                '<div class="inv-title">HÓA ĐƠN ĐIỆN TỬ</div>' +
                '<div class="inv-meta">' +
                '  <div>Mã đơn hàng: <b>' + don.maDon + '</b></div>' +
                '  <div>Ngày xuất: ' + (don.ngayMua || '') + '</div>' +
                '  <div><em>Đơn vị tính: VNĐ</em></div>' +
                '</div>' +

                // Thông tin khách hàng
                '<div class="inv-customer">' +
                '  <div class="row">' +
                '    <div class="col-md-6"><b>Khách hàng:</b> ' + (hk.hoTen || '---') + '</div>' +
                '    <div class="col-md-6"><b>Điện thoại:</b> ' + (hk.sdt || '---') + '</div>' +
                '    <div class="col-md-6"><b>Email:</b> ' + (hk.email || '---') + '</div>' +
                '    <div class="col-md-6"><b>CCCD/CMND:</b> ' + (hk.cmnd || '---') + '</div>' +
                '  </div>' +
                '</div>' +

                // Bảng
                '<table class="inv-table">' +
                '  <thead><tr>' +
                '    <th class="center" style="width:42px;">STT</th>' +
                '    <th>Dịch vụ</th>' +
                '    <th style="width:110px;">Tuyến</th>' +
                '    <th>Chi tiết</th>' +
                '    <th class="center" style="width:48px;">SL</th>' +
                '    <th class="num" style="width:120px;">Đơn giá</th>' +
                '    <th class="num" style="width:130px;">Thành tiền</th>' +
                '  </tr></thead>' +
                '  <tbody>' + rows + '</tbody>' +
                '  <tfoot>' +
                '    <tr><td colspan="6" class="num">Tạm tính</td><td class="num">' + dinhDang(tamTinh) + '</td></tr>' +
                     rowGiam +
                '    <tr><td colspan="6" class="num tong">TỔNG TIỀN ĐƠN HÀNG</td><td class="num tong">' + dinhDang(tongTien) + '</td></tr>' +
                '  </tfoot>' +
                '</table>' +

                '<div class="mt-3" style="font-size:0.88rem;"><b>Hình thức thanh toán:</b> ' + (don.phuongThucThanhToan || 'Chuyển khoản ngân hàng') + '</div>' +

                // Ghi chú
                '<div class="inv-note">' +
                '  <b>Quý khách lưu ý:</b> Hóa đơn điện tử có giá trị xác nhận đặt chỗ. Vui lòng mang theo CCCD/CMND khi làm thủ tục.<br>' +
                '  Để được hỗ trợ, vui lòng liên hệ hotline 1900 1234 hoặc email hotro@viettravelhub.vn (8h00 - 22h00 tất cả các ngày).<br>' +
                '  Cảm ơn Quý khách đã tin tưởng và sử dụng dịch vụ của Viet Travel Hub!' +
                '</div>';
        })();
    </script>
</body>
</html>
